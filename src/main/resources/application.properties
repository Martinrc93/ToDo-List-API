spring.application.name=todolistapi

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

config.jwt.secret-key=${JWT_SECRET_KEY}
config.jwt.expiration-ms=86400000
config.jwt.refresh-expiration-ms=604800000
config.jwt.header-name=Authorization
config.jwt.token-prefix=Bearer